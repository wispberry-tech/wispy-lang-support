[extension]
id = "grov"
name = "Wispy Grove"
description = "Syntax highlighting for Wispy Grove templates"
version = "0.1.0"
schema_version = 1
authors = ["Wispy Contributors"]
repository = "https://github.com/wispy-lang/wispy-grove-support"

[grammars.grov]
repository = "https://github.com/wispy-lang/tree-sitter-grov"
rev = "main"

[language.grov]
scope = "source.grov"
file_types = ["grov"]
line_comments = []
block_comment = ["{#", "#}"]
brackets = [
  { open = "{{", close = "}}", highlight = true },
  { open = "{%", close = "%}", highlight = true },
  { open = "{#", close = "#}", highlight = true },
  { open = "(", close = ")", highlight = true },
  { open = "[", close = "]", highlight = true },
]
